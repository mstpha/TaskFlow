name: taskflow
description: Intelligent task management app
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.3.4

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # UI
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  flex_color_scheme: ^7.3.1

  # Local notifications
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4

  # Utils
  uuid: ^4.3.3
  intl: ^0.20.2
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_intl: ^0.0.1

flutter:
  uses-material-design: true
  generate: true

# Localization
flutter_intl:
  enabled: true
  arb_dir: l10n